version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: voyager_postgres
    environment:
      POSTGRES_DB: voyager_db
      POSTGRES_USER: voyager_user
      POSTGRES_PASSWORD: voyager_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U voyager_user -d voyager_db']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
